name: Aether CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  # ============================================================
  # Full CI suite — Linux (GCC), Linux (Clang), macOS (Clang)
  # Runs `make ci` which is the single source of truth:
  #   compiler (-Werror), ae, stdlib, unit tests,
  #   .ae integration tests (includes REPL tests), examples.
  # ============================================================
  ci:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux / GCC
            os: ubuntu-22.04
            cc: gcc
            install: sudo apt-get update && sudo apt-get install -y gcc make bc

          - name: Linux / Clang
            os: ubuntu-22.04
            cc: clang
            install: sudo apt-get update && sudo apt-get install -y clang make bc

          - name: macOS / Clang (ARM64)
            os: macos-latest
            cc: clang
            install: ""

          - name: macOS / Clang (x86_64)
            os: macos-15-intel
            cc: clang
            install: ""

    steps:
    - uses: actions/checkout@v4

    - name: Install toolchain
      if: matrix.install != ''
      run: ${{ matrix.install }}

    - name: Run full CI suite
      run: CC=${{ matrix.cc }} make ci

  # ============================================================
  # Windows CI — MinGW via MSYS2
  # Runs `make ci` — compiler, ae, stdlib, unit tests,
  # .ae integration tests (includes REPL tests), examples.
  # ============================================================
  ci-windows:
    name: Windows / GCC (MSYS2)
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
    - uses: actions/checkout@v4

    - uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: false
        install: mingw-w64-x86_64-gcc make bc

    - name: Run CI suite
      run: make ci

  # ============================================================
  # Memory safety — Valgrind + AddressSanitizer on Linux/GCC
  # Separate from main CI because it needs special build flags
  # and is slower. Runs in parallel with the ci job.
  # ============================================================
  memory-checks:
    name: Memory Safety (Valgrind + ASan)
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Install tools
      run: |
        sudo apt-get update
        sudo apt-get install -y valgrind gcc-multilib

    - name: Valgrind — runtime test suite
      run: |
        CFLAGS="-g -O0" make compiler
        CFLAGS="-g -O0" make test-build
        valgrind --leak-check=full \
                 --show-leak-kinds=all \
                 --track-origins=yes \
                 --error-exitcode=0 \
                 --log-file=valgrind.log \
                 ./build/test_runner 2>&1 || true
        if grep -q "definitely lost: 0 bytes" valgrind.log && \
           grep -q "indirectly lost: 0 bytes" valgrind.log; then
          echo "No memory leaks detected"
        else
          echo "WARNING: Memory leaks detected (non-fatal)"
          head -100 valgrind.log
        fi
      continue-on-error: true

    - name: AddressSanitizer — runtime test suite
      run: |
        make clean
        make compiler CFLAGS="-fsanitize=address -fno-omit-frame-pointer -g" \
                      LDFLAGS="-fsanitize=address -pthread -lm"
        make test-build CFLAGS="-fsanitize=address -fno-omit-frame-pointer -g" \
                        LDFLAGS="-fsanitize=address -pthread -lm"
        ASAN_OPTIONS=detect_leaks=1:check_initialization_order=1 \
          ./build/test_runner 2>&1 | tee asan.log
        if grep -q "ERROR: AddressSanitizer" asan.log; then
          echo "ERROR: AddressSanitizer detected errors!"
          cat asan.log
          exit 1
        fi

    - name: Upload memory reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: memory-reports
        path: |
          valgrind.log
          asan.log
        retention-days: 7
