name: Memory Leak Detection

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  valgrind-test:
    name: Valgrind Memory Leak Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc make valgrind

    - name: Build with debug symbols
      run: |
        make clean
        make compiler CFLAGS="-O0 -g"
        make test-build CFLAGS="-O0 -g"

    - name: Run Valgrind on test suite
      run: |
        valgrind --leak-check=full \
                 --show-leak-kinds=all \
                 --track-origins=yes \
                 --verbose \
                 --error-exitcode=1 \
                 --suppressions=.valgrind-suppressions \
                 ./build/test_runner 2>&1 | tee valgrind-output.txt || true

    - name: Check for leaks
      run: |
        # Extract definitely lost bytes
        definitely_lost=$(grep "definitely lost:" valgrind-output.txt | grep -oP '\d+(?= bytes)' | head -1 || echo "0")
        indirectly_lost=$(grep "indirectly lost:" valgrind-output.txt | grep -oP '\d+(?= bytes)' | head -1 || echo "0")

        echo "Definitely lost: $definitely_lost bytes"
        echo "Indirectly lost: $indirectly_lost bytes"

        if [ "$definitely_lost" != "0" ] || [ "$indirectly_lost" != "0" ]; then
          echo "ERROR: Memory leaks detected!"
          echo "Leak details:"
          grep -A 10 "definitely lost\|indirectly lost" valgrind-output.txt | head -50
          exit 1
        fi

        # Check for actual memory errors (not just possible leaks)
        if grep -q "Invalid read\|Invalid write\|Invalid free" valgrind-output.txt; then
          echo "ERROR: Memory errors detected!"
          exit 1
        fi

        echo "SUCCESS: No memory leaks detected"

    - name: Upload Valgrind report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: valgrind-report
        path: valgrind-output.txt

  sanitizer-test:
    name: AddressSanitizer & LeakSanitizer
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup GCC
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc make

    - name: Setup Clang
      if: matrix.os == 'macos-latest'
      run: |
        brew install llvm

    - name: Build with AddressSanitizer
      run: |
        make clean
        if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
          # Linux supports LeakSanitizer
          make compiler CFLAGS="-fsanitize=address -fsanitize=leak -fno-omit-frame-pointer -O1 -g" \
                        LDFLAGS="-fsanitize=address -fsanitize=leak -pthread -lm"
          make test-build CFLAGS="-fsanitize=address -fsanitize=leak -fno-omit-frame-pointer -O1 -g" \
                          LDFLAGS="-fsanitize=address -fsanitize=leak -pthread -lm"
        else
          # macOS doesn't support LeakSanitizer
          make compiler CFLAGS="-fsanitize=address -fno-omit-frame-pointer -O1 -g" \
                        LDFLAGS="-fsanitize=address -pthread -lm"
          make test-build CFLAGS="-fsanitize=address -fno-omit-frame-pointer -O1 -g" \
                          LDFLAGS="-fsanitize=address -pthread -lm"
        fi

    - name: Run tests with ASAN
      env:
        ASAN_OPTIONS: detect_leaks=1:halt_on_error=1:abort_on_error=1
        LSAN_OPTIONS: report_objects=1
      run: |
        ./build/test_runner

    - name: Build with UndefinedBehaviorSanitizer
      run: |
        make clean
        make compiler CFLAGS="-fsanitize=undefined -fno-omit-frame-pointer -O1 -g" \
                      LDFLAGS="-fsanitize=undefined -pthread -lm"
        make test-build CFLAGS="-fsanitize=undefined -fno-omit-frame-pointer -O1 -g" \
                        LDFLAGS="-fsanitize=undefined -pthread -lm"

    - name: Run tests with UBSAN
      run: |
        ./build/test_runner

  memory-profiling:
    name: Memory Usage Profiling
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc make valgrind

    - name: Build with memory tracking
      run: |
        make clean
        make compiler CFLAGS="-DAETHER_MEMORY_TRACKING -O2 -g"
        make test-build CFLAGS="-DAETHER_MEMORY_TRACKING -O2 -g"

    - name: Run memory profiling
      run: |
        valgrind --tool=massif \
                 --massif-out-file=massif.out \
                 ./build/test_runner

    - name: Generate memory profile report
      run: |
        ms_print massif.out > memory-profile.txt
        cat memory-profile.txt

    - name: Check peak memory usage
      run: |
        peak=$(grep "peak" massif.out | head -1 | awk '{print $2}')
        echo "Peak memory usage: $peak bytes"

        # Fail if peak memory > 100MB
        if [ "$peak" -gt 104857600 ]; then
          echo "ERROR: Peak memory usage too high: $peak bytes"
          exit 1
        fi
        echo "SUCCESS: Peak memory usage acceptable"

    - name: Upload profiling report
      uses: actions/upload-artifact@v4
      with:
        name: memory-profile
        path: |
          massif.out
          memory-profile.txt

  architecture-tests:
    name: 64-bit Architecture Tests
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup GCC
      run: |
        sudo apt-get update || brew update
        sudo apt-get install -y gcc make || brew install gcc make

    - name: Verify 64-bit compilation
      run: |
        make
        file build/aetherc | grep "64-bit"

    - name: Run tests on 64-bit
      run: |
        make test

    - name: Check pointer size
      run: |
        echo "Checking pointer and long size..."
        echo '#include <stdio.h>' > check_sizes.c
        echo 'int main() {' >> check_sizes.c
        echo '  printf("sizeof(void*) = %zu\n", sizeof(void*));' >> check_sizes.c
        echo '  printf("sizeof(long) = %zu\n", sizeof(long));' >> check_sizes.c
        echo '  printf("sizeof(size_t) = %zu\n", sizeof(size_t));' >> check_sizes.c
        echo '  return 0;' >> check_sizes.c
        echo '}' >> check_sizes.c
        gcc check_sizes.c -o check_sizes
        ./check_sizes

