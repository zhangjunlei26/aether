name: Release

# Every merge to main creates a versioned release automatically.
#
# Version bump rules:
#   - Commit message starts with "major"  ->  bump MAJOR, reset minor + patch to 0
#   - Anything else                       ->  bump MINOR, reset patch to 0  (default)
#
# Manual tag push (v*.*.*) also triggers a build + publish, without bumping.
#
# Version source of truth: git tags (not the VERSION file).
# The bump job creates a lightweight tag; the build checks out that tag so
# VERSION in the archive is always correct.  No PR or branch is created,
# which eliminates the feedback loop where merging the chore PR would
# re-trigger the release pipeline.

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:

jobs:
  # ================================================================== #
  # AUTO-BUMP (main branch merges only)                                #
  #                                                                    #
  # Derives the CURRENT version from the latest v*.*.* tag (not the   #
  # VERSION file), computes the next version, writes VERSION into a   #
  # detached commit, tags it, and pushes only the tag.                #
  #                                                                    #
  # No branch or PR is created -- GITHUB_TOKEN tag pushes do not       #
  # trigger new workflow runs, so there is no feedback loop.           #
  # ================================================================== #
  bump:
    name: Auto-bump version
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: write

    outputs:
      tag:     ${{ steps.v.outputs.tag }}
      version: ${{ steps.v.outputs.version }}

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Compute new version
      id: v
      env:
        COMMIT_MSG: ${{ github.event.head_commit.message }}
      run: |
        # Derive current version from the latest tag (authoritative source).
        # Falls back to VERSION file if no tags exist yet.
        LATEST_TAG=$(git describe --tags --match 'v*.*.*' --abbrev=0 2>/dev/null || echo "")
        if [ -n "$LATEST_TAG" ]; then
          OLD=$(echo "$LATEST_TAG" | sed 's/^v//')
        else
          OLD=$(cat VERSION | tr -d '[:space:]')
        fi

        MAJOR=$(echo "$OLD" | cut -d. -f1)
        MINOR=$(echo "$OLD" | cut -d. -f2)

        if echo "$COMMIT_MSG" | grep -q "^major"; then
          NEW="$((MAJOR + 1)).0.0"
          KIND="major"
        else
          NEW="${MAJOR}.$((MINOR + 1)).0"
          KIND="minor"
        fi

        TAG="v$NEW"

        # Safety: if this tag already exists, skip (idempotent).
        if git rev-parse "$TAG" >/dev/null 2>&1; then
          echo "Tag $TAG already exists -- skipping bump"
          echo "tag="      >> "$GITHUB_OUTPUT"
          echo "version="  >> "$GITHUB_OUTPUT"
          exit 0
        fi

        echo "$NEW" > VERSION
        echo "tag=$TAG"          >> "$GITHUB_OUTPUT"
        echo "version=$NEW"      >> "$GITHUB_OUTPUT"
        echo "Bumped $KIND: $OLD -> $NEW"

    - name: Tag release
      if: steps.v.outputs.tag != ''
      run: |
        VERSION="${{ steps.v.outputs.version }}"
        TAG="${{ steps.v.outputs.tag }}"

        git config user.name  "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

        git add VERSION
        git commit -m "chore: release ${VERSION}"
        git tag "$TAG"

        # Push only the tag -- no branch, no PR.
        # GITHUB_TOKEN tag pushes do NOT trigger new workflow runs.
        git push origin "$TAG"

  # ================================================================== #
  # BUILD -- all four platforms                                         #
  #                                                                    #
  # Waits for bump (main-branch runs) or runs directly (tag pushes).  #
  # Checks out the exact release tag so binaries match VERSION.        #
  # ================================================================== #
  build:
    name: Build -- ${{ matrix.target }}
    needs: bump
    if: |
      always() && (
        (needs.bump.result == 'success' && needs.bump.outputs.tag != '') ||
        startsWith(github.ref, 'refs/tags/')
      )
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
            ext: ""
          - os: macos-15-intel
            target: macos-x86_64
            ext: ""
          - os: macos-latest
            target: macos-arm64
            ext: ""
          - os: windows-latest
            target: windows-x86_64
            ext: ".exe"

    steps:
    # On main-branch runs: check out the tag we just pushed.
    # On manual tag pushes: check out the tag from the push event.
    - uses: actions/checkout@v4
      with:
        ref: ${{ needs.bump.outputs.tag || github.ref }}

    # -- Linux ---
    - name: Setup (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: sudo apt-get update && sudo apt-get install -y gcc make libreadline-dev bc

    # -- Windows -- MinGW-w64 via MSYS2 ---
    - name: Setup (Windows)
      if: matrix.os == 'windows-latest'
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-readline
          make
          zip
          bc

    # -- Build + test: Linux / macOS ---
    - name: Build (Unix)
      if: matrix.os != 'windows-latest'
      run: |
        make compiler
        make ae
        make stdlib

    - name: Test (Unix)
      if: matrix.os != 'windows-latest'
      run: |
        make test
        make test-ae
        make test-install

    - name: Strip (Unix)
      if: matrix.os != 'windows-latest'
      run: strip build/aetherc build/ae 2>/dev/null || true

    # -- Build + test: Windows (MSYS2 shell) ---
    - name: Build (Windows)
      if: matrix.os == 'windows-latest'
      shell: msys2 {0}
      run: |
        make compiler
        make ae
        make stdlib

    - name: Test (Windows)
      if: matrix.os == 'windows-latest'
      shell: msys2 {0}
      run: |
        make test
        make test-ae
        make test-install

    - name: Strip (Windows)
      if: matrix.os == 'windows-latest'
      shell: msys2 {0}
      run: strip build/aetherc.exe build/ae.exe 2>/dev/null || true

    # -- Package: Unix ---
    - name: Package (Unix)
      if: matrix.os != 'windows-latest'
      run: |
        VERSION=$(cat VERSION | tr -d '[:space:]')
        mkdir -p release/bin release/lib release/share/aether release/include/aether
        cp build/aetherc release/bin/
        cp build/ae      release/bin/
        chmod 755 release/bin/*
        if [ -f build/libaether.a ]; then
          cp build/libaether.a release/lib/
        fi
        # Headers (preserve directory structure)
        for dir in runtime runtime/actors runtime/scheduler runtime/utils \
                   runtime/memory runtime/config std std/string std/io std/math \
                   std/net std/collections std/json std/fs std/log; do
          if [ -d "$dir" ]; then
            mkdir -p "release/include/aether/$dir"
            cp "$dir"/*.h "release/include/aether/$dir/" 2>/dev/null || true
          fi
        done
        # Runtime source (fallback for linking without libaether.a)
        cp -r runtime release/share/aether/
        cp -r std     release/share/aether/
        cp LICENSE README.md VERSION release/
        cd release && tar -czf ../aether-${VERSION}-${{ matrix.target }}.tar.gz *

    # -- Package: Windows (MSYS2 shell) ---
    - name: Package (Windows)
      if: matrix.os == 'windows-latest'
      shell: msys2 {0}
      run: |
        VERSION=$(cat VERSION | tr -d '[:space:]')
        mkdir -p release/bin release/lib release/share/aether release/include/aether
        cp build/aetherc.exe release/bin/
        cp build/ae.exe      release/bin/
        if [ -f build/libaether.a ]; then
          cp build/libaether.a release/lib/
        fi
        # Headers (preserve directory structure)
        for dir in runtime runtime/actors runtime/scheduler runtime/utils \
                   runtime/memory runtime/config std std/string std/io std/math \
                   std/net std/collections std/json std/fs std/log; do
          if [ -d "$dir" ]; then
            mkdir -p "release/include/aether/$dir"
            cp "$dir"/*.h "release/include/aether/$dir/" 2>/dev/null || true
          fi
        done
        # Runtime source (fallback for linking without libaether.a)
        cp -r runtime release/share/aether/
        cp -r std     release/share/aether/
        cp LICENSE README.md VERSION release/
        cd release && zip -r ../aether-${VERSION}-${{ matrix.target }}.zip *

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: aether-${{ matrix.target }}
        path: |
          aether-*-${{ matrix.target }}.tar.gz
          aether-*-${{ matrix.target }}.zip
        retention-days: 7

  # ================================================================== #
  # PUBLISH -- create or update the GitHub Release                      #
  # ================================================================== #
  publish:
    name: Publish release
    needs: [bump, build]
    runs-on: ubuntu-latest
    if: |
      always() && needs.build.result == 'success' && (
        (needs.bump.result == 'success' && needs.bump.outputs.tag != '') ||
        startsWith(github.ref, 'refs/tags/')
      )

    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ needs.bump.outputs.tag || github.ref }}

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        merge-multiple: true

    - name: Resolve release tag
      id: tag
      run: |
        # Prefer the tag produced by the bump job; fall back to the push tag.
        TAG="${{ needs.bump.outputs.tag }}"
        if [ -z "$TAG" ]; then
          TAG="${{ github.ref_name }}"
        fi
        VERSION=$(cat VERSION | tr -d '[:space:]')
        echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"

    - name: Build release body
      run: python3 .github/scripts/build_release_body.py ${{ steps.tag.outputs.version }}

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name:   ${{ steps.tag.outputs.tag }}
        name:       Aether ${{ steps.tag.outputs.version }}
        make_latest: true
        draft: false
        prerelease: ${{ contains(steps.tag.outputs.tag, 'alpha') || contains(steps.tag.outputs.tag, 'beta') || contains(steps.tag.outputs.tag, 'rc') }}
        body_path: /tmp/release_body.md
        files: |
          aether-*.tar.gz
          aether-*.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
