version: '3.8'

services:
  # Main Aether compiler build and test environment
  aether-build:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: aether:latest
    container_name: aether-compiler
    volumes:
      - ..:/aether
      - ../examples:/work/examples
    working_dir: /aether
    command: /bin/bash
    stdin_open: true
    tty: true

  # Development environment with all tools
  aether-dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    image: aether-dev:latest
    container_name: aether-dev
    volumes:
      - ..:/aether
    working_dir: /aether
    environment:
      - CC=gcc
      - CFLAGS=-O2
    command: /bin/bash
    stdin_open: true
    tty: true

  # Test runner
  aether-test:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: aether:latest
    container_name: aether-test
    volumes:
      - ..:/aether
    working_dir: /aether
    command: make test
    depends_on:
      - aether-build
