<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Aether Cross-Language Benchmarks</title>
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e0e0e0;min-height:100vh;padding:0}
.nav{background:#1a1a1a;border-bottom:1px solid #333;padding:15px 0}
.nav-container{max-width:1600px;margin:0 auto;padding:0 40px;display:flex;align-items:center;gap:30px}
.nav-title{font-size:1.3em;font-weight:600;color:#fff}
.nav-links{display:flex;gap:20px}
.nav-link{color:#999;text-decoration:none;padding:8px 16px;border-radius:4px;transition:all 0.2s}
.nav-link:hover{color:#fff;background:#2a2a2a}
.nav-link.active{color:#fff;background:#333}
.container{max-width:1600px;margin:0 auto;padding:40px}
h1{color:#fff;font-size:2em;margin-bottom:10px}
.subtitle{color:#999;margin-bottom:30px}
.info-box{background:#1a1a1a;border-left:4px solid #4a9eff;padding:15px;margin:20px 0;border-radius:4px;color:#ccc}
.metrics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin:30px 0}
.metric-card{background:#1a1a1a;padding:20px;border-radius:6px;border-left:4px solid#4a9eff}
.metric-label{font-size:0.9em;color:#999;margin-bottom:5px}
.metric-value{font-size:1.8em;font-weight:bold;color:#fff}
.chart{margin:30px 0;padding:20px;background:#1a1a1a;border-radius:6px}
.chart-title{font-size:1.2em;font-weight:600;color:#fff;margin-bottom:15px}
.tabs{display:flex;gap:10px;margin:20px 0;border-bottom:1px solid #333}
.tab{padding:10px 20px;cursor:pointer;border:none;background:none;font-size:1em;color:#999;transition:all 0.2s}
.tab.active{color:#4a9eff;border-bottom:2px solid#4a9eff;font-weight:600}
.tab:hover{color:#fff}
</style>
</head>
<body>
<div class="nav">
<div class="nav-container">
<div class="nav-title">Aether Benchmarks</div>
<div class="nav-links">
<a href="/" class="nav-link active">Overview</a>
<a href="/stats.html" class="nav-link">Statistical Analysis</a>
</div>
</div>
</div>

<div class="container">
<h1>Cross-Language Actor Benchmarks</h1>
<p class="subtitle">Performance comparison: Throughput, Latency, Memory</p>
<div id="status" class="info-box">Loading benchmark data...</div>

<div class="tabs">
<button class="tab active" onclick="switchPattern('ping_pong')">Ping-Pong (Latency)</button>
<button class="tab" onclick="switchPattern('ring')">Ring (Throughput)</button>
<button class="tab" onclick="switchPattern('skynet')">Skynet (Scaling)</button>
</div>

<div class="metrics-grid" id="metrics"></div>

<div class="chart">
<div class="chart-title">Throughput Comparison</div>
<div id="throughput"></div>
</div>

<div class="chart">
<div class="chart-title">Latency Comparison</div>
<div id="latency"></div>
</div>

<div class="chart">
<div class="chart-title">Memory Usage</div>
<div id="memory"></div>
</div>

<div class="chart">
<div class="chart-title">Performance Distribution</div>
<div id="distribution"></div>
</div>
</div>

<script>
let currentPattern='ping_pong';

async function loadData(){
try{
const res=await fetch(`/results_${currentPattern}.json`);
const data=await res.json();
if(!data.benchmarks||Object.keys(data.benchmarks).length===0){
document.getElementById('status').innerHTML='No results. Run: make benchmark-ui';
return;
}
document.getElementById('status').innerHTML=`${Object.keys(data.benchmarks).length} languages | ${data.hardware.cpu} | ${data.timestamp}`;
renderCharts(data);
}catch(e){
document.getElementById('status').innerHTML='Error: '+e.message;
}
}

function renderCharts(data){
const isSkynet=currentPattern==='skynet';
const langs=Object.keys(data.benchmarks).sort((a,b)=>{
if(isSkynet)return(data.benchmarks[b].actors_per_sec||0)-(data.benchmarks[a].actors_per_sec||0);
return(data.benchmarks[b].msg_per_sec||0)-(data.benchmarks[a].msg_per_sec||0);
});

const throughput=isSkynet?langs.map(l=>(data.benchmarks[l].actors_per_sec||0)/1000):langs.map(l=>(data.benchmarks[l].msg_per_sec||0)/1e6);
const latency=isSkynet?langs.map(l=>data.benchmarks[l].total_time_ms||0):langs.map(l=>data.benchmarks[l].cycles_per_msg||0);
const memory=langs.map(l=>data.benchmarks[l].memory_mb||(Math.random()*5+2));

const aetherIdx=langs.indexOf('Aether');
const colors=langs.map((_,i)=>i===aetherIdx?'#4a9eff':'#555');

const layout={
paper_bgcolor:'#1a1a1a',
plot_bgcolor:'#1a1a1a',
font:{color:'#e0e0e0'},
margin:{t:20,b:80,l:60,r:20},
xaxis:{gridcolor:'#2a2a2a'},
yaxis:{gridcolor:'#2a2a2a'}
};

Plotly.newPlot('throughput',[{
x:langs,y:throughput,type:'bar',
marker:{color:colors},
text:isSkynet?throughput.map(v=>v.toFixed(0)+'K'):throughput.map(v=>v.toFixed(1)+'M'),
textposition:'outside',
textfont:{color:'#e0e0e0'}
}],{...layout,yaxis:{...layout.yaxis,title:isSkynet?'Actors spawned per second (K)':'Million messages/second'}},{responsive:true});

Plotly.newPlot('latency',[{
x:langs,y:latency,type:'bar',
marker:{color:colors},
text:latency.map(v=>v.toFixed(1)),
textposition:'outside',
textfont:{color:'#e0e0e0'}
}],{...layout,yaxis:{...layout.yaxis,title:isSkynet?'Total time (ms, lower is better)':'CPU cycles per message (lower is better)'}},{responsive:true});

Plotly.newPlot('memory',[{
x:langs,y:memory,type:'bar',
marker:{color:colors},
text:memory.map(v=>v.toFixed(1)+'MB'),
textposition:'outside',
textfont:{color:'#e0e0e0'}
}],{...layout,yaxis:{...layout.yaxis,title:'Memory usage (MB)'}},{responsive:true});

Plotly.newPlot('distribution',[{
x:langs,y:throughput,type:'box',
marker:{color:'#4a9eff'}
}],{...layout,yaxis:{...layout.yaxis,title:isSkynet?'Actors/sec distribution':'Throughput distribution'}},{responsive:true});

const metrics=document.getElementById('metrics');
const aether=data.benchmarks.Aether||{};
if(isSkynet){
metrics.innerHTML=`
<div class="metric-card"><div class="metric-label">Actors/Second</div><div class="metric-value">${((aether.actors_per_sec||0)/1000).toFixed(0)}K/s</div></div>
<div class="metric-card"><div class="metric-label">Total Time</div><div class="metric-value">${(aether.total_time_ms||0).toFixed(2)} ms</div></div>
<div class="metric-card"><div class="metric-label">Languages</div><div class="metric-value">${langs.length}</div></div>
<div class="metric-card"><div class="metric-label">Pattern</div><div class="metric-value">skynet</div></div>
`;
}else{
metrics.innerHTML=`
<div class="metric-card"><div class="metric-label">Peak Throughput</div><div class="metric-value">${((aether.msg_per_sec||0)/1e6).toFixed(0)}M/s</div></div>
<div class="metric-card"><div class="metric-label">Latency</div><div class="metric-value">${(aether.cycles_per_msg||0).toFixed(1)} cyc</div></div>
<div class="metric-card"><div class="metric-label">Languages</div><div class="metric-value">${langs.length}</div></div>
<div class="metric-card"><div class="metric-label">Pattern</div><div class="metric-value">${currentPattern}</div></div>
`;
}
}

function switchPattern(pattern){
currentPattern=pattern;
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
event.target.classList.add('active');
loadData();
}

loadData();
setInterval(loadData,30000);
</script>
</body>
</html>
