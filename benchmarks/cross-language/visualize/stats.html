<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Aether Statistical Analysis</title>
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e0e0e0;min-height:100vh;padding:0}
.nav{background:#1a1a1a;border-bottom:1px solid #333;padding:15px 0}
.nav-container{max-width:1600px;margin:0 auto;padding:0 40px;display:flex;align-items:center;gap:30px}
.nav-title{font-size:1.3em;font-weight:600;color:#fff}
.nav-links{display:flex;gap:20px}
.nav-link{color:#999;text-decoration:none;padding:8px 16px;border-radius:4px;transition:all 0.2s}
.nav-link:hover{color:#fff;background:#2a2a2a}
.nav-link.active{color:#fff;background:#333}
.container{max-width:1600px;margin:0 auto;padding:40px}
h1{color:#fff;font-size:2.2em;margin-bottom:10px}
.subtitle{color:#999;margin-bottom:30px}
.info-box{background:#1a1a1a;border-left:4px solid #4a9eff;padding:15px;margin:20px 0;border-radius:4px;color:#ccc}
.metrics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;margin:30px 0}
.metric-card{background:#1a1a1a;padding:20px;border-radius:6px;border-left:4px solid#4a9eff}
.metric-label{font-size:0.9em;color:#999;margin-bottom:5px}
.metric-value{font-size:1.8em;font-weight:bold;color:#fff}
.metric-detail{font-size:0.85em;color:#777;margin-top:5px}
.chart{margin:30px 0;padding:20px;background:#1a1a1a;border-radius:6px}
.chart-title{font-size:1.3em;font-weight:600;color:#fff;margin-bottom:15px}
table{width:100%;border-collapse:collapse;margin:20px 0;font-size:0.9em;background:#1a1a1a}
th{background:#2a2a2a;color:#fff;padding:12px;text-align:left;border-bottom:2px solid#4a9eff}
td{padding:10px;border-bottom:1px solid #2a2a2a;color:#ccc}
tr:hover{background:#222}
.winner{color:#4a9eff;font-weight:bold}
</style>
</head>
<body>
<div class="nav">
<div class="nav-container">
<div class="nav-title">Aether Benchmarks</div>
<div class="nav-links">
<a href="/" class="nav-link">Overview</a>
<a href="/stats.html" class="nav-link active">Statistical Analysis</a>
</div>
</div>
</div>
<div class="container">
<h1>Complete Language Comparison</h1>
<p class="subtitle">All languages with unified measurement methodology</p>
<div id="status" class="info-box">Loading...</div>
<div class="metrics-grid" id="metrics"></div>
<div class="chart"><div class="chart-title">Throughput Comparison</div><div id="tp"></div></div>
<div class="chart"><div class="chart-title">Latency Comparison (lower is better)</div><div id="lat"></div></div>
<div class="chart"><div class="chart-title">Memory Usage</div><div id="mem"></div></div>
<div class="chart"><div class="chart-title">Comparison Table</div><table id="tbl"></table></div>
</div>
<script>
async function load(){
try{
const r=await fetch('/results_ping_pong.json');
const d=await r.json();
if(!d.benchmarks||!Object.keys(d.benchmarks).length){
document.getElementById('status').innerHTML='No results. Run: make benchmark-ui';
return;
}
document.getElementById('status').innerHTML=`${Object.keys(d.benchmarks).length} languages | ${d.hardware.cpu} | Unified methodology`;
render(d);
}catch(e){
document.getElementById('status').innerHTML='Error: '+e.message;
}
}
function render(d){
const l=Object.keys(d.benchmarks).sort((a,b)=>(d.benchmarks[b].msg_per_sec||0)-(d.benchmarks[a].msg_per_sec||0));
const tm=l.map(x=>(d.benchmarks[x].msg_per_sec||0)/1e6);
const lm=l.map(x=>d.benchmarks[x].cycles_per_msg||0);
const mm=l.map(x=>d.benchmarks[x].memory_mb||1);
const ai=l.indexOf('Aether');
const c=l.map((_,i)=>i===ai?'#4a9eff':'#555');
const ly={paper_bgcolor:'#1a1a1a',plot_bgcolor:'#1a1a1a',font:{color:'#e0e0e0'},margin:{t:20,b:90,l:60,r:20},xaxis:{gridcolor:'#2a2a2a'},yaxis:{gridcolor:'#2a2a2a'}};
Plotly.newPlot('tp',[{x:l,y:tm,type:'bar',marker:{color:c},text:tm.map(v=>v.toFixed(1)+'M'),textposition:'outside',textfont:{color:'#e0e0e0'}}],{...ly,yaxis:{...ly.yaxis,title:'M msg/sec'}},{responsive:true});
Plotly.newPlot('lat',[{x:l,y:lm,type:'bar',marker:{color:c},text:lm.map(v=>v.toFixed(1)),textposition:'outside',textfont:{color:'#e0e0e0'}}],{...ly,yaxis:{...ly.yaxis,title:'cyc/msg'}},{responsive:true});
Plotly.newPlot('mem',[{x:l,y:mm,type:'bar',marker:{color:c},text:mm.map(v=>v.toFixed(2)+'MB'),textposition:'outside',textfont:{color:'#e0e0e0'}}],{...ly,yaxis:{...ly.yaxis,title:'MB'}},{responsive:true});
const a=d.benchmarks.Aether||{};
document.getElementById('metrics').innerHTML=`
<div class="metric-card"><div class="metric-label">Aether Throughput</div><div class="metric-value">${((a.msg_per_sec||0)/1e6).toFixed(0)}M/s</div><div class="metric-detail">Lock-free SPSC</div></div>
<div class="metric-card"><div class="metric-label">Aether Latency</div><div class="metric-value">${(a.cycles_per_msg||0).toFixed(1)}</div><div class="metric-detail">cyc/msg</div></div>
<div class="metric-card"><div class="metric-label">Aether Memory</div><div class="metric-value">${(a.memory_mb||0).toFixed(1)}MB</div><div class="metric-detail">RSS</div></div>
<div class="metric-card"><div class="metric-label">Languages</div><div class="metric-value">${l.length}</div><div class="metric-detail">All measured</div></div>`;
let h='<tr><th>Rank</th><th>Language</th><th>Runtime</th><th>Throughput</th><th>Latency</th><th>Memory</th><th>Notes</th></tr>';
l.forEach((n,i)=>{
const b=d.benchmarks[n];
h+=`<tr><td>${i+1}</td><td class="${i===0?'winner':''}">${n}</td><td>${b.runtime}</td><td>${((b.msg_per_sec||0)/1e6).toFixed(2)} M/s</td><td>${(b.cycles_per_msg||0).toFixed(1)}</td><td>${(b.memory_mb||1).toFixed(2)}</td><td>${b.notes}</td></tr>`;
});
document.getElementById('tbl').innerHTML=h;
}
load();
setInterval(load,60000);
</script>
</body>
</html>
