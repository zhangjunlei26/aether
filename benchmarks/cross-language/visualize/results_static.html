<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether Benchmark Results</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 40px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #667eea;
            text-align: center;
            margin-bottom: 30px;
        }
        .chart {
            margin: 30px 0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 30px 0;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background: #667eea;
            color: white;
        }
        tr:hover {
            background: #f5f5f5;
        }
        .winner {
            background: #d4edda !important;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Aether Cross-Language Benchmark Results</h1>
        
        <div id="throughput-chart" class="chart"></div>
        <div id="cycles-chart" class="chart"></div>
        
        <h2>Detailed Results</h2>
        <table id="results-table">
            <thead>
                <tr>
                    <th>Language</th>
                    <th>Throughput (M msg/sec)</th>
                    <th>Cycles/msg</th>
                    <th>Runtime</th>
                    <th>Notes</th>
                </tr>
            </thead>
            <tbody id="results-body"></tbody>
        </table>
        
        <h3>Hardware</h3>
        <p id="hardware"></p>
        <p id="timestamp"></p>
    </div>
    
    <script>
        // Embedded results data
        const data = {
    "benchmarks":  {
                       "Aether":  {
                                      "runtime":  "Native C",
                                      "cycles_per_msg":  14.02,
                                      "msg_per_sec":  214000000,
                                      "notes":  "Batched atomic updates"
                                  },
                       "C++":  {
                                   "runtime":  "Native",
                                   "cycles_per_msg":  199.534,
                                   "msg_per_sec":  15000000,
                                   "notes":  "std::thread + std::atomic"
                               }
                   },
    "timestamp":  "2026-01-12T00:01:16Z",
    "hardware":  {
                     "cpu":  "13th Gen Intel(R) Core(TM) i7-13700K",
                     "cores":  24,
                     "os":  "Windows"
                 }
};
        
        // Sort by performance
        const sorted = Object.entries(data.benchmarks)
            .sort((a, b) => b[1].msg_per_sec - a[1].msg_per_sec);
        
        const languages = sorted.map(([lang]) => lang);
        const throughput = sorted.map(([_, stats]) => stats.msg_per_sec / 1000000);
        const cycles = sorted.map(([_, stats]) => stats.cycles_per_msg);
        
        // Create throughput chart
        Plotly.newPlot('throughput-chart', [{
            x: languages,
            y: throughput,
            type: 'bar',
            marker: {
                color: languages.map((lang, i) => i === 0 ? '#28a745' : '#667eea')
            },
            text: throughput.map(v => v.toFixed(0) + 'M'),
            textposition: 'auto',
        }], {
            title: 'Throughput Comparison (Higher is Better)',
            xaxis: { title: 'Language' },
            yaxis: { title: 'Messages per Second (Millions)' }
        });
        
        // Create cycles chart
        Plotly.newPlot('cycles-chart', [{
            x: languages,
            y: cycles,
            type: 'bar',
            marker: {
                color: languages.map((lang, i) => i === 0 ? '#28a745' : '#dc3545')
            },
            text: cycles.map(v => v.toFixed(2)),
            textposition: 'auto',
        }], {
            title: 'Latency Comparison (Lower is Better)',
            xaxis: { title: 'Language' },
            yaxis: { title: 'CPU Cycles per Message' }
        });
        
        // Fill table
        const tbody = document.getElementById('results-body');
        sorted.forEach(([lang, stats], i) => {
            const row = tbody.insertRow();
            if (i === 0) row.className = 'winner';
            row.insertCell().textContent = lang;
            row.insertCell().textContent = (stats.msg_per_sec / 1000000).toFixed(0);
            row.insertCell().textContent = stats.cycles_per_msg.toFixed(2);
            row.insertCell().textContent = stats.runtime;
            row.insertCell().textContent = stats.notes;
        });
        
        // Hardware info
        document.getElementById('hardware').textContent = 
            `CPU: ${data.hardware.cpu} | Cores: ${data.hardware.cores} | OS: ${data.hardware.os}`;
        document.getElementById('timestamp').textContent = 
            `Last run: ${data.timestamp}`;
    </script>
</body>
</html>
