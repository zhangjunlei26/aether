<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Module icon with transparent background for .ae files -->
  <defs>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00CED1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#20B2AA;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFB700;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Letter 'a' in gold -->
  <text x="-2" y="112" font-family="Consolas, 'Courier New', monospace" font-size="128" font-weight="900" 
        fill="url(#goldGrad)" letter-spacing="-5">a</text>
  <!-- Letter 'e' in cyan -->
  <text x="62" y="112" font-family="Consolas, 'Courier New', monospace" font-size="128" font-weight="900" 
        fill="url(#cyanGrad)" letter-spacing="-5">e</text>
</svg>
